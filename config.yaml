# ============================================================
# Bacterial Colony ABM — Simulation Hyperparameters
# ============================================================
# Biological Assumptions & References
# ------------------------------------
# Growth: Monod kinetics (Monod J., 1949, Ann. Rev. Microbiol.)
#   μ = μ_max · S / (K_s + S)
#   ΔX = μ ;  ΔS = μ / Y_{X/S}   (mass-balance conservation)
# Logistic growth: lab_bacterial_growth repo uses logistic eq.
#   N(t) = K / (1 + ((K − N₀)/N₀) · e^{−k·t})  where k = ln2/T_d
#   In our ABM this S-curve *emerges* from per-agent Monod + carrying cap.
# LTEE: E. coli Long-Term Evolution Experiment (Lenski 1988–present)
#   - Fitness increase follows a power law (Wiser et al. 2013)
#   - Mutation accumulation is linear & clock-like (Barrick et al. 2009)
#   - 50 % of populations evolved hypermutator phenotypes
#   - All 12 populations show increased cell size & faster growth
# Carrying capacity: Logistic growth ceiling (Verhulst, 1838)
# Death: Stochastic, age-dependent senescence + environmental stress
#   Antibiotic death uses saturating Hill function (half-max = 2.0)
# Toxins: Narrow-spectrum bacteriocins (colicin model, Riley & Wertz 2002)
# Quorum Sensing: LuxI/LuxR autoinducer circuit (Fuqua et al., 1994)
# Biofilm: EPS matrix as public good, reduces antibiotic penetration
# HGT: One-way conjugative plasmid transfer (Frost et al., 2005)
#   Donor sends copy of resistance plasmid to recipient; donor retains traits
# Fitness: Multi-trait weighted landscape (Fisher's geometric model)
# Conservation: Mass-balance enforced — growth requires resource consumption,
#   toxin/EPS production costs biomass (thermodynamic constraint)
# ============================================================

# --- Grid / Environment ---
grid:
  width: 200
  height: 200

resource:
  scenario: "resource-rich"        # "resource-rich" | "resource-depleted"
  initial_concentration: 15.0      # nutrient units per cell (DM25 glucose analog)
  replenishment_rate: 0.25         # chemostat inflow per epoch (resource-rich only)
  diffusion_rate: 0.1              # Fickian diffusion coefficient
  max_concentration: 30.0          # finite reservoir cap

# --- Antibiotic stress ---
antibiotic:
  mode: "gradual"                  # "gradual" | "spike" | "center" | "sweep"
  start_epoch: 60                  # epoch of introduction
  gradual_rate: 0.05               # per-epoch addition at source edge
  spike_concentration: 5.0         # single bolus amount
  decay_rate: 0.015                # slower decay → gradient propagates further
  diffusion_rate: 0.3              # strong diffusion → visible spatial gradient
  max_concentration: 8.0           # absolute cap (prevents runaway accumulation)

# --- Bacterium defaults ---
bacterium:
  initial_count: 300
  max_age: 300                     # replicative senescence (Hayflick limit analog)
  division_threshold: 2.0          # biomass to trigger binary fission
  base_death_rate: 0.005           # basal mortality
  lag_phase_duration: 5            # enzyme induction period
  maintenance_energy: 0.01         # per-epoch metabolic maintenance cost
  toxin_production_cost: 0.02      # biomass cost per unit toxin secreted
  public_good_cost: 0.015          # biomass cost for EPS matrix production

# --- Monod growth kinetics ---
monod:
  mu_max: 0.8                      # max specific growth rate (h^-1)
  Ks: 1.0                          # half-saturation constant
  yield_coefficient: 0.4           # Y_x/s (biomass yield per substrate)

# --- Mutation / Evolution ---
mutation:
  rate: 0.01                       # per-division mutation probability
  resistance_delta: 0.1            # max antibiotic resistance perturbation
  efficiency_delta: 0.05           # max nutrient efficiency perturbation
  toxin_production_delta: 0.03     # max toxin trait perturbation
  public_good_delta: 0.03          # max cooperation trait perturbation

# --- Genotype system ---
genotype:
  initial_types: 3
  max_types: 20                    # bounded genotype pool

# --- Quorum Sensing / Cooperation ---
quorum_sensing:
  signal_production_rate: 0.05     # AHL per cell per epoch (increased for spatial model)
  signal_diffusion_rate: 0.12
  signal_decay_rate: 0.05          # enzymatic degradation
  activation_threshold: 0.15       # [AHL] for LuxR activation (lowered for sparse grid)
  biofilm_resistance_multiplier: 0.5
  biofilm_resource_sharing: 0.05   # fraction of consumed resource shared locally

# --- Toxin / Bacteriocin ---
toxin:
  secretion_rate: 0.12             # 4x previous — colicins are potent locally
  diffusion_rate: 0.04             # low diffusion — bacteriocins act within a few cell-lengths
  decay_rate: 0.03                 # slower degradation → builds up in contested zones
  lethality: 0.15
  self_immunity: 1.0

# --- Horizontal Gene Transfer ---
hgt:
  probability: 0.005               # conjugation frequency per neighbor per epoch
  radius: 1

# --- Carrying capacity ---
population:
  carrying_capacity: 10000

# --- Fitness landscape ---
fitness:
  weight_growth: 0.4
  weight_resistance: 0.3
  weight_efficiency: 0.2
  weight_cooperation: 0.1

# --- Simulation ---
simulation:
  epochs: 200
  output_dir: "output"
  charts_dir: "charts"
  csv_filename: "simulation_metrics.csv"
  seed: 42
